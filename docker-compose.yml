name: ghostbusters

services:
  postgres:
    image: postgres:17
    container_name: ghostbusters-db
    restart: "no"
    ports:
      - "5566:5432"
    environment:
      POSTGRES_DB: ghostbusters
      POSTGRES_USER: ghostbusters
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ghostbusters_dev}
    volumes:
      - ../local_data/db_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostbusters"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ghostbusters-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghostbusters-app
    restart: "no"
    ports:
      - "8066:8066"
      - "8067:8067"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ghostbusters
      DB_USER: ghostbusters
      DB_PASSWORD: ${DB_PASSWORD:-ghostbusters_dev}
      FLASK_PORT: 8066
      MCP_PORT: 8067
      AI_PROVIDER: ${AI_PROVIDER:-claude}
      FASTMCP_PORT: 8067
      EMBEDDING_SERVICE_URL: http://embeddings:5000
      ROBERTA_SERVICE_URL: http://roberta:5000
    volumes:
      - ./backend:/app
      - ./tools:/tools
      - ../local_data:/local_data
      - ${USERPROFILE:-.}/.claude:/root/.claude
    depends_on:
      postgres:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    networks:
      - ghostbusters-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ghostbusters-ui
    restart: "no"
    ports:
      - "5176:5176"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ghostbusters-net

  embeddings:
    build:
      context: ./docker/embeddings
      dockerfile: Dockerfile
    container_name: ghostbusters-embeddings
    restart: "no"
    networks:
      - ghostbusters-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  roberta:
    build:
      context: ./docker/roberta
      dockerfile: Dockerfile
    container_name: ghostbusters-roberta
    profiles: ["research"]
    restart: "no"
    networks:
      - ghostbusters-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  ghostbusters-net:
    driver: bridge
